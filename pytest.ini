# =============================================================================
# КОНФИГУРАЦИЯ PYTEST
# =============================================================================

[pytest]
# Пути поиска тестов
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Параметры вывода
addopts = 
    -v              # Подробный вывод
    --tb=short      # Короткий traceback
    --strict-markers # Строгие маркеры
    --strict-config  # Строгая конфигурация
    -ra             # Показать причины всех тестов

# Маркеры
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    requires_env: Tests that require .env file

# Исключения
norecursedirs = 
    .git
    .github
    venv
    .venv
    __pycache__
    node_modules
    .pytest_cache

# Фильтры предупреждений
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Покрытие (если установлен pytest-cov)
# addopts = --cov=bot3 --cov=botlight --cov-report=html --cov-report=term-missing
