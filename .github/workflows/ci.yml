# =============================================================================
# CI WORKFLOW ДЛЯ BYPASS_KEENETIC
# =============================================================================
# Автоматическая проверка кода при push и pull request
# =============================================================================

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ---------------------------------------------------------------------------
  # LINTING
  # ---------------------------------------------------------------------------
  lint-python:
    name: Python Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint
      
      - name: Check formatting with black
        run: black --check bot3/ botlight/ --exclude='.git|__pycache__|venv|.venv'
        continue-on-error: true
      
      - name: Check imports with isort
        run: isort --check-only bot3/ botlight/ --skip=.git --skip=venv --skip=.venv
        continue-on-error: true
      
      - name: Lint with flake8
        run: |
          flake8 bot3/ botlight/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=.git,__pycache__,venv,.venv
        continue-on-error: true

  lint-shell:
    name: Shell Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@v2
        with:
          ignore_paths: >-
            **/vendor/**
            **/.git/**
          severity: warning

  # ---------------------------------------------------------------------------
  # SECURITY
  # ---------------------------------------------------------------------------
  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      
      - name: Check for vulnerabilities
        run: pip-audit --requirement requirements.txt
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # VALIDATION
  # ---------------------------------------------------------------------------
  validate-config:
    name: Validate Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv
      
      - name: Validate .env.example
        run: |
          cp .env.example .env.test
          echo "TELEGRAM_BOT_TOKEN=123456789:ABCdefGHIjklMNOpqrsTUVwxyz" >> .env.test
          echo "TELEGRAM_USERNAMES=testuser" >> .env.test
          python -c "from dotenv import load_dotenv; load_dotenv('.env.test'); import os; assert os.environ.get('TELEGRAM_BOT_TOKEN'); print('✓ .env.example valid')"
      
      - name: Validate bot_config.py syntax (bot3)
        run: python -m py_compile bot3/bot_config.py
      
      - name: Validate bot_config.py syntax (botlight)
        run: python -m py_compile botlight/bot_config.py
